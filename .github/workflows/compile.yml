name: Rebuild COMPILED governance set and .txt twins

on:
  push:
    branches: [main]
    paths:
      - 'Blueprint/BLUEPRINT.md'
      - 'Blueprint/PROCESSES.md'
      - 'Blueprint/STATUS.yaml'
      - 'Blueprint/REFERENCES.yaml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build COMPILED set and .txt twins
        run: |
          python3 - <<'EOF'
          import datetime

          # Canonical source of truth: the four component files below.
          # Everything else this job writes is DERIVED OUTPUT — never edit
          # a .txt twin or a COMPILED file by hand; edit the component and
          # push, and this job regenerates them byte-identically.
          stamp = datetime.datetime.now().strftime("%d%m%y")
          parts = [
              ("CORE",       "Blueprint/BLUEPRINT.md"),
              ("PROCESSES",  "Blueprint/PROCESSES.md"),
              ("STATUS",     "Blueprint/STATUS.yaml"),
              ("REFERENCES", "Blueprint/REFERENCES.yaml"),
          ]

          sep = "\n\n" + "=" * 60 + "\n"
          out = [
              "# BKP PIPELINE — COMPILED GOVERNANCE SET\n\n"
              f"{stamp}_compiled.md\n"
              "Components: CORE + PROCESSES + STATUS + REFERENCES, "
              "compiled verbatim from the live registry. "
              "Auto-rebuilt on every push to a component file.\n"
          ]
          for name, path in parts:
              body = open(path, encoding="utf-8").read().strip()
              out.append(f"{sep}# PART: {name}\n{'=' * 60}\n\n{body}\n")
          compiled = "".join(out)

          # COMPILED, both extensions, identical bytes.
          for target in ("Blueprint/COMPILED.md", "Blueprint/COMPILED.txt"):
              open(target, "w", encoding="utf-8").write(compiled)

          # Component .txt twins — verbatim copies for distribution
          # (NotebookLM / Drive / sending to people). Canonical stays
          # .md and .yaml; these exist only to travel.
          for _, path in parts:
              twin = path.rsplit(".", 1)[0] + ".txt"
              open(twin, "w", encoding="utf-8").write(
                  open(path, encoding="utf-8").read()
              )
              print(f"twin: {path} -> {twin}")
          EOF

      - name: Verify twins are byte-identical
        run: |
          set -e
          cmp Blueprint/BLUEPRINT.md   Blueprint/BLUEPRINT.txt
          cmp Blueprint/PROCESSES.md   Blueprint/PROCESSES.txt
          cmp Blueprint/STATUS.yaml    Blueprint/STATUS.txt
          cmp Blueprint/REFERENCES.yaml Blueprint/REFERENCES.txt
          cmp Blueprint/COMPILED.md    Blueprint/COMPILED.txt
          echo "all twins byte-identical"

      - name: Install pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc librsvg2-bin

      - name: Build BLUEPRINT.docx
        run: |
          python3 - <<'EOF'
          import re, subprocess, os

          # Builds the published volume from COMPILED.md via a scratch copy.
          # COMPILED.md is NEVER modified here — the twins check depends on
          # it staying byte-identical to COMPILED.txt.

          src = open("Blueprint/COMPILED.md", encoding="utf-8").read()

          # Drop the compile header block (first 5 lines) — the volume
          # gets its own front matter below.
          body = "\n".join(src.split("\n")[5:])

          # Part dividers: the ==== rules the compile step generates.
          # Convert '==== / # PART: NAME / ====' to a bare page break.
          # Each component already carries its own H1.
          body = re.sub(
              r"={10,}\n# PART: [A-Z]+\n={10,}\n",
              "\\\\newpage\n",
              body,
          )

          # Any surviving ==== rules are deleted outright. NOT converted
          # to '---': in Markdown that is setext syntax and would silently
          # promote the preceding line to a heading.
          body = re.sub(r"^={10,}$\n?", "", body, flags=re.M)

          # Strip Google-Docs over-escaping. Deliberately narrow: does not
          # touch \* or \\ , which can be load-bearing.
          body = re.sub(r"\\([+<>_\[\]])", r"\1", body)

          front = (
              "---\n"
              'title: "The Bangkok Post Blueprint 2026"\n'
              'subtitle: "A deterministic, AI-first reimagining of '
              'newspaper sub-editing"\n'
              "---\n\n"
              "# The Bangkok Post Blueprint 2026\n\n"
              "**A deterministic, AI-first reimagining of "
              "newspaper sub-editing**\n\n"
              "*This is why we have style…*\n\n"
              "![](qr-code.svg){width=3.5cm}\n\n"
              "\\newpage\n\n"
          )

          open("/tmp/volume.md", "w", encoding="utf-8").write(front + body)

          args = [
              "pandoc", "/tmp/volume.md",
              "-o", "Blueprint/BLUEPRINT.docx",
              "--resource-path=Blueprint",
              "--toc", "--toc-depth=3",
          ]
          if os.path.exists("Blueprint/reference.docx"):
              args.append("--reference-doc=Blueprint/reference.docx")
              print("using reference.docx")
          else:
              print("no reference.docx — building unstyled")

          subprocess.run(args, check=True)
          print("built Blueprint/BLUEPRINT.docx")
          EOF

      - name: Commit if changed
        run: |
          git config user.name "compile-bot"
          git config user.email "actions@users.noreply.github.com"
          git add Blueprint/COMPILED.md Blueprint/COMPILED.txt \
                  Blueprint/BLUEPRINT.txt Blueprint/PROCESSES.txt \
                  Blueprint/STATUS.txt Blueprint/REFERENCES.txt \
                  Blueprint/BLUEPRINT.docx
          git diff --cached --quiet || git commit -m "Auto-rebuild COMPILED set, .txt twins and BLUEPRINT.docx"
          git push
